version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: adspy-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db

  # Bonus: Puppeteer deps if needed (Chrome)
  # puppeteer-deps:
  #   image: zenika/alpine-chrome
  #   ...

volumes:
  mongo-data:

